{% extends "base.html" %}

{% block title %}FSI Lifecycle Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3 text-center">Sign in to Lifecycle</h1>
        <p class="text-muted small text-center mb-4">Use your FSI account email to continue.</p>

        {% if error_message %}
          <div class="alert alert-danger" role="alert">{{ error_message }}</div>
        {% endif %}

        <form method="post" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input id="email" name="email" type="email" class="form-control" required autocomplete="email" />
          </div>

          <button type="submit" class="btn fsi-button-primary w-100">Sign in</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
