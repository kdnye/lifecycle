{% extends "base.html" %}

{% block title %}{{ error_code }} — {{ error_title }}{% endblock %}

{% block content %}
<div class="container d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh;">
  <div class="fsi-card text-center" style="max-width: 480px; width: 100%;">
    <div class="mb-3">
      <span class="display-1 fw-bold" style="color: var(--brand-primary);">{{ error_code }}</span>
    </div>
    <h1 class="h3 mb-2">{{ error_title }}</h1>
    <p class="text-muted mb-4">{{ error_message }}</p>
    <a href="{{ url_for('dashboard.index') }}" class="btn fsi-button-primary">Go Home</a>
  </div>
</div>
{% endblock %}
