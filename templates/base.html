<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}FSI Lifecycle{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: Roboto, system-ui, sans-serif; margin: 2rem; }
      .fsi-display { font-family: 'Bebas Neue', system-ui, sans-serif; letter-spacing: 0.04em; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; max-width: 720px; }
      label, input, select, button { display: block; width: 100%; margin-top: 0.5rem; }
      button { padding: 0.6rem; margin-top: 1rem; }
    </style>
  </head>
  <body>
    {% block content %}{% endblock %}
  </body>
</html>
