{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
  <div class="card-body">
    <h1 class="fsi-display">Communication Options</h1>
    <p class="lead">Set endpoint routing addresses for lifecycle notifications and vendor ticketing.</p>

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="mb-3">
        <label for="it_support_email" class="form-label">IT Support Endpoint Email</label>
        <input id="it_support_email" name="it_support_email" type="email" required
               class="form-control" value="{{ options.it_support_email }}" />
      </div>

      <div class="mb-3">
        <label for="it_sales_email" class="form-label">IT Sales Endpoint Email</label>
        <input id="it_sales_email" name="it_sales_email" type="email" required
               class="form-control" value="{{ options.it_sales_email }}" />
      </div>

      <div class="mb-3">
        <label for="telecon_sales_email" class="form-label">Telecon Setup &amp; Sales Email</label>
        <input id="telecon_sales_email" name="telecon_sales_email" type="email" required
               class="form-control" value="{{ options.telecon_sales_email }}" />
      </div>

      <div class="mb-3">
        <label for="internal_notification_list" class="form-label">Internal Notification List (comma-separated)</label>
        <input id="internal_notification_list" name="internal_notification_list" type="text"
               class="form-control" placeholder="hr@example.com, accounting@example.com"
               value="{{ options.internal_notification_list }}" />
      </div>

      <button class="btn fsi-button-primary" type="submit">Save Communication Options</button>
    </form>
  </div>
</div>
{% endblock %}
