{% extends "base.html" %}
{% block title %}Employee Lifecycle Intake{% endblock %}

{% block content %}
  <h1 class="fsi-display">Employee Lifecycle Intake</h1>
  <div class="card">
    <p>Starter outline: collect intake data, map through Role + Question + Action matrices, and preview MSP actions.</p>
    <form id="intake-form">
      <label for="first_name">Legal First Name</label>
      <input id="first_name" name="first_name" required />

      <label for="last_name">Legal Last Name</label>
      <input id="last_name" name="last_name" required />

      <label for="role_profile">Role profile</label>
      <select id="role_profile" name="role_profile">
        <option value="driver">Driver</option>
        <option value="office" selected>Office/Ops</option>
        <option value="manager">Manager</option>
        <option value="warehouse">Warehouse</option>
        <option value="contractor">Contractor</option>
      </select>

      <label for="event_type">Lifecycle event</label>
      <select id="event_type" name="event_type">
        <option value="onboarding" selected>Onboarding</option>
        <option value="offboarding">Offboarding</option>
      </select>

      <button type="submit" id="submit-btn">Process Lifecycle Event</button>
    </form>

    <h2 class="fsi-display">Expected Vendor Tasks</h2>
    <p id="tasks-status" aria-live="polite"></p>
    <ul id="tasks-list"></ul>

    <pre id="result"></pre>
  </div>

  <script>
    const form = document.getElementById('intake-form');
    const roleProfile = document.getElementById('role_profile');
    const eventType = document.getElementById('event_type');
    const tasksStatus = document.getElementById('tasks-status');
    const tasksList = document.getElementById('tasks-list');
    const result = document.getElementById('result');
    const submitBtn = document.getElementById('submit-btn');

    const getPayload = () => Object.fromEntries(new FormData(form).entries());

    const renderTaskPreview = (actions) => {
      tasksList.innerHTML = '';
      if (!Array.isArray(actions) || actions.length === 0) {
        tasksStatus.textContent = 'No vendor tasks are expected for this selection.';
        return;
      }

      tasksStatus.textContent = `${actions.length} expected vendor task${actions.length === 1 ? '' : 's'}:`;
      actions.forEach((item) => {
        const listItem = document.createElement('li');
        listItem.textContent = `${item.vendor}: ${item.action}`;
        tasksList.appendChild(listItem);
      });
    };

    const fetchAndRenderPreview = async () => {
      tasksStatus.textContent = 'Loading expected vendor tasks...';
      const payload = getPayload();
      payload.employee_name = `${payload.first_name || ''} ${payload.last_name || ''}`.trim();

      try {
        const response = await fetch('/preview-actions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const data = await response.json();
        renderTaskPreview(data.actions);
      } catch (error) {
        tasksList.innerHTML = '';
        tasksStatus.textContent = 'Unable to load expected vendor tasks right now. Please try again.';
      }
    };

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Processing...';

      try {
        const response = await fetch('/process-onboarding', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(getPayload()),
        });

        result.textContent = JSON.stringify(await response.json(), null, 2);
      } catch (error) {
        result.textContent = JSON.stringify({ status: 'error', message: 'Unable to process lifecycle event.' }, null, 2);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Process Lifecycle Event';
      }
    });

    document.getElementById('first_name').addEventListener('input', fetchAndRenderPreview);
    document.getElementById('last_name').addEventListener('input', fetchAndRenderPreview);
    roleProfile.addEventListener('change', fetchAndRenderPreview);
    eventType.addEventListener('change', fetchAndRenderPreview);
    fetchAndRenderPreview();
  </script>
{% endblock %}
