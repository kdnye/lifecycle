steps:
  - name: 'python:3.11-slim'
    id: 'run-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-env
        pytest --cov=. --cov-report=term-missing --cov-fail-under=80

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/lifecycle:$COMMIT_SHA', '.']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lifecycle:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--add-cloudsql-instances'
      - '${_INSTANCE_CONNECTION_NAME}'
      - '--set-env-vars'
      - 'INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},MIGRATE_ON_STARTUP=false'
      - '--set-secrets'
      - 'DB_PASS=expense_db_pass:latest,DB_USER=expense_db_user:latest,DB_NAME=expense_db_name:latest'

images:
  - 'gcr.io/$PROJECT_ID/lifecycle:$COMMIT_SHA'

substitutions:
  _SERVICE_NAME: 'employeelifecycle'
  _REGION: 'us-central1'
  _INSTANCE_CONNECTION_NAME: 'quote-tool-483716:us-central1:quote-postgres'
